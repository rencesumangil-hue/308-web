<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav>
  <div class="nav-left">
    <div class="logo">
      <a href="/index.html">
        <img src="images/mlc-logo.png" alt="MLC Tattoo Supplies">
      </a>
    </div>
  </div>

  <div class="nav-center">
    <a href="/index.html#home">Home</a>
    <a href="/index.html#portfolio">Portfolio</a>
    <a href="/index.html#schedule">Schedule</a>
    <a href="/index.html#about">About</a>
    <a href="/booking.html">Book Appointment</a>
  </div>

  
</nav>

<div class="form-container">
<h2>Create Account</h2>
<form action="/auth/register" method="POST" onsubmit="return validatePassword()">
<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<div class="password-wrapper">
  <input type="password" id="password" name="password" placeholder="Password" required>
  <span class="toggle-eye" onclick="togglePass()">👁</span>
</div>
<button type="submit">Register</button>
</form>
</div>

<script>
function showToast(message){
const toast = document.createElement("div");
toast.className = "toast";
toast.innerText = message;

document.body.appendChild(toast);

setTimeout(()=>toast.classList.add("show"),100);

setTimeout(()=>{
toast.classList.remove("show");
setTimeout(()=>toast.remove(),300);
},2500);
}

const params = new URLSearchParams(window.location.search);

if(params.get("error") === "exists"){
showToast("Email already exists");
}
if(params.get("error") === "weak"){
  showToast("Password must be 7+ chars, 1 uppercase, 1 special character");
}

function togglePass(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}


function validatePassword(){
  const password = document.getElementById("password").value;

 
  const regex = /^(?=.*[A-Z])(?=.*[\W_]).{7,}$/;

  if(!regex.test(password)){
    showToast("Password must be 7+ chars, 1 uppercase, 1 special character");
    return false; 
  }

  return true;
}

</script>

</body>
</html>
