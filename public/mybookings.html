<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>
<link rel="stylesheet" href="/css/style.css">

</head>
<body>

<nav>
  <div class="nav-left">
    <div class="logo">
      <a href="/index.html">
        <img src="images/mlc-logo.png" alt="MLC Tattoo Supplies">
      </a>
    </div>
  </div>

  <div class="nav-center">
    <a href="/index.html#home">Home</a>
    <a href="/index.html#portfolio">Portfolio</a>
    <a href="/index.html#schedule">Schedule</a>
    <a href="/index.html#about">About</a>
    <a href="/booking.html">Book Appointment</a>
  </div>

  <div class="nav-right">
    <a href="/mybookings.html" class="nav-white">My Bookings</a>
    <a href="/auth/logout" class="nav-red">Logout</a>
  </div>
</nav>



<h2 style="margin-top:120px;text-align:center;">My Bookings</h2>

<div class="bookings-wrapper" id="myBookings"></div>



<script>

let cancelId = null;

/* ================= LOAD BOOKINGS ================= */

fetch('/booking/my') 
.then(res=>res.json())
.then(data=>{

const container=document.getElementById('myBookings');

if(data.length===0){
container.innerHTML="<p style='text-align:center;'>No bookings yet.</p>";
}

data.forEach(b=>{

const datePH = new Date(b.booking_date).toLocaleDateString("en-PH");

container.innerHTML += `
<div class="booking-card">

<div class="booking-top">

<div class="booking-left">
<p><strong>Date:</strong> ${datePH}</p>
<p><strong>Time:</strong> ${b.booking_time}</p>
</div>

${(b.status || "Pending") === "Pending" ? 
`<button class="cancel-btn" onclick="cancelBooking('${b.id}')">✕</button>` 
: ""}

</div>

<p class="status-text">
<span class="status ${b.status.toLowerCase()}">${b.status}</span>
</p>

</div>
`;

});

});


/* ================= OPEN MODAL ================= */

function cancelBooking(id){
console.log("CLICKED ID:", id);
cancelId = id;
document.getElementById("cancelModal").style.display="flex";
}


/* ================= WAIT UNTIL PAGE LOADS ================= */

document.addEventListener("DOMContentLoaded", function(){

/* CLOSE MODAL */

document.getElementById("cancelNo").onclick=function(){
document.getElementById("cancelModal").style.display="none";
}


/* CONFIRM CANCEL */

document.getElementById("cancelYes").onclick=function(e){

e.stopPropagation();

fetch('/booking/delete/' + cancelId,{
method:'DELETE'
})
.then(res=>res.json())
.then(data=>{
if(data.success){

const toast = document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
location.reload();
},1500);

}else{
alert("Failed to cancel booking");
}
});

}

});



let clientBookingId = null;




</script>


<!-- ================= CANCEL MODAL ================= -->

<div id="cancelModal" class="cancel-modal">

<div class="cancel-box">

<h3>Cancel Booking</h3>

<p>Are you sure you want to cancel this booking?</p>

<div class="cancel-actions">

<button id="cancelNo" class="cancel-no">No</button>

<button id="cancelYes" class="cancel-yes">Yes, Cancel</button>

</div>

</div>

</div>

<div id="toast" class="toast">Booking cancelled successfully</div>






</body>
</html>
