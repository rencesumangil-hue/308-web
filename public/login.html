<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <nav>
    <div class="nav-left">
        <div class="logo">
            <img src="images/mlc-logo.png" alt="MLC Tattoo Supplies">
        </div>
    </div>

    <div class="nav-right">
        <a href="index.html" class="nav-red">Back</a>
    </div>
    </nav>

<div class="form-container">
<h2>Login</h2>
<form action="/auth/login" method="POST">

<input type="email" name="email" placeholder="Email" required>
<input type="password" id="password" name="password" placeholder="Password" required>

<script>
function togglePass(){
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>
<div class="login-row">
    <label class="show-pass">
        <input type="checkbox" onclick="togglePass()">
        Show Password
    </label>

    <button type="submit">Login</button>
</div>
</form>
<br>
<p>Don't have account? <a href="/register.html">Register</a></p>
</div>

<script>
document.getElementById("showPass").addEventListener("change", function() {
    const pass = document.getElementById("password");
    pass.type = this.checked ? "text" : "password";
});

// 🔥 TOAST FUNCTION
function showToast(message){
const toast = document.createElement("div");
toast.className = "toast";
toast.innerText = message;

document.body.appendChild(toast);

setTimeout(()=>toast.classList.add("show"),100);

setTimeout(()=>{
toast.classList.remove("show");
setTimeout(()=>toast.remove(),300);
},2500);
}

// 🔥 CHECK URL PARAMS
const params = new URLSearchParams(window.location.search);

if(params.get("error") === "wrong"){
showToast("Wrong password");
}

if(params.get("error") === "notfound"){
showToast("User not found");
}

if(params.get("success") === "created"){
showToast("Account created, please log in");
}


</script>

</body>
</html>
