<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<nav>
  <div class="nav-left">
    <div class="logo">
      <a href="/index.html">
        <img src="images/mlc-logo.png" alt="MLC Tattoo Supplies">
      </a>
    </div>
  </div>

  <div class="nav-center">
    <a href="/index.html#home">Home</a>
    <a href="/index.html#portfolio">Portfolio</a>
    <a href="/index.html#schedule">Schedule</a>
    <a href="/index.html#about">About</a>
    <a href="/booking.html">Book Appointment</a>
  </div>

  
</nav>

<div class="form-container">
<h2>Login</h2>
<form action="/auth/login" method="POST">

<input type="email" name="email" placeholder="Email" required>

<div class="password-wrapper">
  <input type="password" id="password" name="password" placeholder="Password" required>
  <span class="toggle-eye" onclick="togglePass()">👁</span>
</div>

<div class="g-recaptcha" data-sitekey="6LfHXJksAAAAAIf9Q21oSyJiNQYK6ajFV1eQq6BR"></div>

<p style="margin-top:10px;">
  <a href="/forgot.html">Forgot Password?</a>
</p>

<div class="login-row">


    <button type="submit">Login</button>
</div>
</form>
<br>
<p>Don't have account? <a href="/register.html">Register</a></p>
</div>

<script>

function togglePass(){
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function showToast(message){
const toast = document.createElement("div");
toast.className = "toast";
toast.innerText = message;

document.body.appendChild(toast);

setTimeout(()=>toast.classList.add("show"),100);

setTimeout(()=>{
toast.classList.remove("show");
setTimeout(()=>toast.remove(),300);
},2500);
}

const params = new URLSearchParams(window.location.search);

if(params.get("error") === "wrong"){
showToast("Wrong password");
}

if(params.get("error") === "notfound"){
showToast("User not found");
}

if(params.get("success") === "created"){
showToast("Account created, please log in");
}

if(params.get("error") === "captcha"){
  showToast("Please verify captcha");
}

if(params.get("success") === "reset"){
  showToast("Password updated successfully");
}

</script>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</body>
</html>
