<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body class="booking-page">
<nav>
  <div class="nav-left">
    <div class="logo">
      <a href="/index.html">
        <img src="images/mlc-logo.png" alt="MLC Tattoo Supplies">
      </a>
    </div>
  </div>

  <div class="nav-center">
    <a href="/index.html#home">Home</a>
    <a href="/index.html#portfolio">Portfolio</a>
    <a href="/index.html#schedule">Schedule</a>
    <a href="/index.html#about">About</a>
    <a href="/booking.html">Book Appointment</a>
  </div>

  <div class="nav-right">
    <a href="/mybookings.html" class="nav-white">My Bookings</a>
    <a href="/auth/logout" class="nav-red">Logout</a>
  </div>

</nav>

<div class="form-container">
<h2>Book Appointment</h2>
<form id="bookingForm" enctype="multipart/form-data">
<input type="date" name="booking_date" id="bookingDate">
<label>Time:</label>
<select name="booking_time" required>
<option value="">Select Time</option>
<option value="10:00 AM">10:00 AM</option>
<option value="11:00 AM">11:00 AM</option>
<option value="12:00 PM">12:00 PM</option>
<option value="1:00 PM">1:00 PM</option>
<option value="2:00 PM">2:00 PM</option>
<option value="3:00 PM">3:00 PM</option>
<option value="4:00 PM">4:00 PM</option>
<option value="5:00 PM">5:00 PM</option>
<option value="6:00 PM">6:00 PM</option>
</select>

<label>Tattoo Reference:</label>
<input type="file" name="tattoo_reference" required>

<select name="tattoo_area" required>
<option value="">Select Tattoo Area</option>
<option value="Leg">Legs</option>
<option value="Back">Back</option>
<option value="Arm">Arms</option>
<option value="Chest">Chest</option>
</select>

<div style="text-align:center; margin-bottom:15px;">
    <button type="button" onclick="openGcash()" class="btn">
        View GCash QR
    </button>
</div>

<label>Proof of Payment:</label>
<input type="file" name="proof_of_payment" required>
<input 
  type="text" 
  name="mobile_number" 
  id="mobile_number"
  placeholder="09XXXXXXXXX"
  maxlength="11"
  required
  oninput="validateNumber(this)"
>

<button type="submit">Submit Booking</button>

</form>
</div>

<script>

fetch('/auth/status')
.then(res => res.json())
.then(data => {
    if(!data.loggedIn){
        window.location.href = "/login.html";
    }
});

const form = document.getElementById("bookingForm");
const dateInput = document.querySelector("input[name='booking_date']");
const timeSelect = document.querySelector("select[name='booking_time']");
const submitBtn = document.querySelector("button[type='submit']");

/* ================= DATE CHANGE ================= */

dateInput.addEventListener("change", async ()=>{

const date = dateInput.value;

/* ================= CHECK FULL DATE ================= */
const resCount = await fetch('/booking/count/' + date);
const countData = await resCount.json();

if(countData.total >= 3){

showFullModal(date);
dateInput.value = "";
submitBtn.disabled = true;
return;

}else{
submitBtn.disabled = false;
}

/* ================= LOAD TIME BOOKINGS ================= */
const res = await fetch(`/booking/date-info/${date}`);
const data = await res.json();

/* COUNT PER TIME */
let timeCount = {};

data.forEach(b=>{
if(!timeCount[b.booking_time]){
timeCount[b.booking_time]=0;
}
timeCount[b.booking_time]++;
});

/* RESET OPTIONS */
Array.from(timeSelect.options).forEach(option=>{
if(!option.value) return;

option.disabled = false;
option.textContent = option.value;
option.style.color = "#fff";
});

/* APPLY FULL */
Array.from(timeSelect.options).forEach(option=>{

const time = option.value;

if(timeCount[time] >= 2){
option.disabled = true;
option.textContent = time + " (FULL)";
option.style.color = "#888";
}

});

/* APPLY PAST TIME */
disablePastTimes();

});

/* ================= SUBMIT ================= */

form.addEventListener("submit", function(e){
e.preventDefault();

fetch('/booking/create', {
method:'POST',
body:new FormData(form)
})
.then(res=>res.json())
.then(data=>{
if(data.success){
showToast("Booking submitted successfully!");

setTimeout(()=>{
window.location.href="/mybookings.html";
},2000);
}else{
showToast(data.message || "Booking failed");
}
});
});

/* ================= TOAST ================= */

function showToast(message){
const toast = document.getElementById("toast");
toast.textContent = message;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},3000);
}

/* ================= FULL MODAL ================= */

function showFullModal(date){
document.getElementById("fullMessage").innerText =
date + " is already fully booked.";
document.getElementById("fullModal").style.display = "flex";
}

function closeFullModal(){
document.getElementById("fullModal").style.display = "none";
}

/* ================= DATE LIMIT ================= */

const today = new Date().toISOString().split('T')[0];
document.getElementById("bookingDate").setAttribute("min", today);

/* ================= GCASH ================= */

function openGcash(){
document.getElementById("gcashModal").style.display="flex";
}

function closeGcash(){
document.getElementById("gcashModal").style.display="none";
}

window.onclick = function(e){
const modal = document.getElementById("gcashModal");
if(e.target === modal){
closeGcash();
}
}

/* ================= PAST TIME ================= */

function disablePastTimes(){

const selectedDate = dateInput.value;
const today = new Date().toISOString().split('T')[0];

if(selectedDate !== today) return;

const now = new Date();
let currentHour = now.getHours();

timeSelect.querySelectorAll("option").forEach(option=>{

if(!option.value) return;

let hour = parseInt(option.value);

if(option.value.includes("PM") && hour !== 12){
hour += 12;
}

if(option.value.includes("AM") && hour === 12){
hour = 0;
}

if(hour < currentHour){
option.disabled = true;
option.style.color = "#888";
}

});

}

/* INIT */
document.addEventListener("DOMContentLoaded", disablePastTimes);

function validateNumber(input){

  let value = input.value.replace(/[^0-9]/g,'');
  input.value = value;

  if(value.length === 0){
    input.setCustomValidity('');
    return;
  }

  if(!/^09[0-9]{9}$/.test(value)){
    input.setCustomValidity("Enter valid PH number (09XXXXXXXXX)");
  }else{
    input.setCustomValidity("");
  }

}

</script>

<div id="toast" class="toast"></div>


<div id="fullModal" class="cancel-modal">

<div class="cancel-box">

<h3>Schedule Full</h3>

<p id="fullMessage"></p>

<div class="cancel-actions">
<button onclick="closeFullModal()" class="cancel-no">Close</button>
</div>

</div>

</div>


<div id="gcashModal" class="gcash-modal">

    <div class="gcash-box">

        <p class="gcash-note">
            500 downpayment and refundable upon visiting our shop
        </p>

        <img src="/images/gcash.jpg" alt="GCash QR">



    </div>

</div>

</body>
</html>
